appId: com.quotex.app
---
- launchApp
- tapOn:
    id: "settings-tab"
- tapOn:
    id: "toggle-offline-mode"
- tapOn:
    id: "add-quote-button"
- inputText:
    id: "quote-input"
    text: "Test offline quote"
- tapOn:
    id: "save-button"
- assertVisible:
    id: "offline-save-confirmation"
- assertVisible:
    id: "sync-pending-badge"
- tapOn:
    id: "toggle-offline-mode"
- assertVisible:
    id: "sync-started-indicator"
    timeout: 5000
- assertVisible:
    id: "sync-complete-toast"
    timeout: 10000
