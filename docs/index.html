<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documents Légaux - Quotex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0F0F0F;
      --surface-color: #1A1A1A;
      --text-primary: #FFFFFF;
      --text-secondary: #9CA3AF;
      --accent-color: #20B8CD;
      --border-color: #2A2A2A;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      width: 100%;
      background-color: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-container img {
      height: 40px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
    }

    p {
      color: var(--text-secondary);
      font-size: 15px;
      margin-bottom: 32px;
    }

    .links-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .legal-link {
      display: block;
      padding: 16px;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .legal-link:hover {
      border-color: var(--accent-color);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="./assets/images/frame.svg" alt="Quotex Logo">
      <h1>Quotex</h1>
    </div>
    <p>Documents officiels et légaux de l'application.</p>
    <div class="links-list">
      <a href="cgu/" class="legal-link">Conditions Générales d'Utilisation</a>
      <a href="confidentialite/" class="legal-link">Politique de Confidentialité</a>
    </div>
  </div>
</body>
</html>
