name: Quotex CI/CD
on:
  push:
    branches: ['**']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run Jest tests
        run: npm test -- --passWithNoTests

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: coverage/

  maestro-e2e:
    name: Run Maestro E2E Tests
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/tags/v*'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Maestro
        run: curl -Ls https://mobile.dev/install | bash

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Run E2E Tests (Build & Test)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6_pro
          ndk: 23.2.8568313
          script: |
            npx eas build --profile development --platform android --local --non-interactive --output=app.apk
            adb install app.apk
            npx maestro test .maestro/
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_DEV_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_DEV_KEY }}
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.SUPABASE_DEV_URL }}/functions/v1


  build-dev:
    name: Build Development
    needs: test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build development
        run: npx eas build --profile development --platform all --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_DEV_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_DEV_KEY }}
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.SUPABASE_DEV_URL }}/functions/v1

  build-prod:
    name: Build Production
    needs: test
    if: github.ref == 'refs/tags/v*'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npx eas build --profile production --platform all --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_PROD_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_PROD_KEY }}
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.SUPABASE_PROD_URL }}/functions/v1

      - name: Submit to stores
        run: npx eas submit --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  notify-email:
    name: Notify Email
    needs: [test, build-dev, build-prod]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          subject: "Quotex CI/CD Status"
          body: |
            Workflow de build terminé pour la branche/tag : ${{ github.ref }}
            - Tests unitaires (Jest) : ${{ needs.test.result }}
            - Build Dev : ${{ needs.build-dev.result }}
            - Build Prod : ${{ needs.build-prod.result }}
